<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Cetak Kartu Ujian SMANJO</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8B5CF6;
      --bg-color: #F8FAFC;
      --card-bg: #FFFFFF;
      --text-main: #1E293B;
      --text-muted: #64748B;
    }
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 20px;
      color: var(--text-main);
    }

    /* =======================================================
       TAMPILAN LOGIN ADMIN
       ======================================================= */
    #login-admin-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
    }

    .admin-card {
      background: var(--card-bg);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 40px -10px rgba(139, 92, 246, 0.15);
      width: 100%;
      max-width: 400px;
      text-align: center;
      border: 1px solid #F1F5F9;
    }

    .admin-card img { width: 100px; margin-bottom: 20px; }
    .admin-card h2 { margin: 0 0 5px 0; font-weight: 800; color: var(--primary); }
    .admin-card p { margin: 0 0 25px 0; color: var(--text-muted); font-size: 14px; }

    .input-group { text-align: left; margin-bottom: 20px; }
    .input-group label { display: block; font-weight: 700; font-size: 13px; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; }
    .input-group input { 
      width: 100%; padding: 14px 18px; border: 2px solid #E2E8F0; 
      border-radius: 12px; font-size: 15px; font-family: inherit; box-sizing: border-box;
      transition: 0.3s;
    }
    .input-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1); }

    .btn-login {
      background: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%);
      color: #FFF; border: none; padding: 15px; width: 100%;
      border-radius: 12px; font-weight: 800; font-size: 15px; cursor: pointer;
      transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
    }
    .btn-login:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(236, 72, 153, 0.4); }
    .btn-login:disabled { opacity: 0.7; cursor: wait; }

    #pesan-error { color: #E11D48; font-size: 13px; font-weight: 700; margin-top: 15px; display: none; background: #FFF1F2; padding: 10px; border-radius: 8px; }

    /* =======================================================
       TAMPILAN KONTROL & CETAK KARTU (Sembunyi Diawal)
       ======================================================= */
    #app-container { display: none; }

    .control-panel {
      max-width: 800px; margin: 0 auto 30px auto;
      background: #FFF; padding: 25px; border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
      text-align: center; border: 1px solid #F1F5F9;
    }
    .control-panel h2 { margin-top: 0; color: #1E293B; }
    
    .btn-print {
      background: #10B981; color: #FFF; border: none; padding: 12px 24px;
      border-radius: 12px; font-weight: 800; font-size: 15px; cursor: pointer;
      transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;
    }
    .btn-print:hover { background: #059669; transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4); }
    
    .btn-logout {
      background: transparent; color: #EF4444; border: 2px solid #EF4444; padding: 10px 20px;
      border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer;
      margin-left: 10px; transition: 0.2s;
    }
    .btn-logout:hover { background: #FEF2F2; }

    /* =======================================================
       PENGATURAN KERTAS A4 & KARTU (TAMPILAN PRINT)
       ======================================================= */
    @page { size: A4 portrait; margin: 10mm; }

    .a4-page {
      width: 190mm; height: 277mm; margin: 0 auto 20mm auto; background: #FFF;
      display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(5, 1fr); 
      gap: 5mm; box-sizing: border-box; page-break-after: always; box-shadow: 0 0 15px rgba(0,0,0,0.05);
    }

    .kartu { border: 1px dashed #64748B; box-sizing: border-box; padding: 10px; display: flex; flex-direction: column; justify-content: flex-start; background: #FFF; }
    .kartu-header { display: flex; align-items: center; border-bottom: 2px solid #1E293B; padding-bottom: 6px; margin-bottom: 8px; }
    .kartu-logo { width: 45px; height: auto; margin-right: 10px; }
    
    .kop-sekolah { flex: 1; text-align: center; line-height: 1.2; }
    .kop-1 { font-size: 8px; font-weight: 600; text-transform: uppercase; }
    .kop-2 { font-size: 11px; font-weight: 800; letter-spacing: 0.5px; margin: 2px 0; }
    .kop-3 { font-size: 9px; font-weight: 700; background: #1E293B; color: #FFF; display: inline-block; padding: 2px 8px; border-radius: 10px; }

    .kartu-body table { width: 100%; font-size: 10px; border-collapse: collapse; }
    .kartu-body td { padding: 4px 0; vertical-align: top; }
    .kartu-body td:nth-child(1) { width: 35%; font-weight: 600; }
    .kartu-body td:nth-child(2) { width: 5%; text-align: center; }
    .kartu-body td:nth-child(3) { width: 60%; font-weight: 800; font-size: 11px; }

    .box-password { background: #F1F5F9; border: 1px solid #1E293B; padding: 2px 5px; font-family: monospace; font-size: 12px !important; display: inline-block; letter-spacing: 1px; }
    .catatan { margin-top: auto; font-size: 7px; text-align: center; font-style: italic; border-top: 1px dotted #94A3B8; padding-top: 4px; color: #475569; }

    @media print {
      body { background: #FFF; padding: 0; }
      .control-panel, #login-admin-container { display: none !important; } 
      .a4-page { box-shadow: none; margin: 0; border: none; }
      .kartu { border: 1px solid #000; } 
    }
  </style>
</head>
<body>

  <div id="login-admin-container">
    <div class="admin-card">
      <img src="https://i.ibb.co.com/zTHpGJ3W/20260513-105333-0000.png" alt="Logo SMANJO">
      <h2>Portal Admin</h2>
      <p>Akses khusus Panitia Ujian SMANJO</p>
      
      <div class="input-group">
        <label>Password Akses</label>
        <input type="password" id="adminPass" placeholder="Masukkan password admin..." onkeypress="handleEnter(event)">
      </div>
      
      <button class="btn-login" id="btnLoginAdmin" onclick="loginAdmin()">Buka Data Kartu</button>
      <div id="pesan-error"></div>
    </div>
  </div>

  <div id="app-container">
    <div class="control-panel no-print">
      <h2>🖨️ Cetak Kartu Peserta Ujian</h2>
      <p style="color: #64748B; font-size: 14px; margin-bottom: 20px;">Data berhasil ditarik. Silakan cetak pada kertas ukuran A4.</p>
      <button class="btn-print" onclick="window.print()">Cetak Kartu Sekarang</button>
      <button class="btn-logout" onclick="location.reload()">Kunci & Keluar</button>
    </div>

    <div id="print-area"></div>
  </div>

  <script>
    // ==========================================
    // MASUKKAN URL WEB APP GAS ANDA DI SINI
    // ==========================================
    const URL_API_GAS = "https://script.google.com/macros/s/AKfycbyGi8A3MIDN-aOLnPfBbupq-Xv74shn4W5_i5NnWPlr6ww5rJbUFefngSuXe7tHxROy/exec";
    
    const LOGO_URL = "https://i.ibb.co.com/zTHpGJ3W/20260513-105333-0000.png";

    // Fungsi agar bisa menekan Enter saat mengetik password
    function handleEnter(e) {
      if(e.key === 'Enter') { loginAdmin(); }
    }

    function loginAdmin() {
      const pass = document.getElementById('adminPass').value;
      if(!pass) return;

      const btn = document.getElementById('btnLoginAdmin');
      const errBox = document.getElementById('pesan-error');
      
      btn.disabled = true;
      btn.innerText = "MENGOTENTIKASI...";
      errBox.style.display = "none";

      fetch(URL_API_GAS, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ 
          action: "getDaftarSiswa",
          passwordAdmin: pass // Mengirim password untuk dicek di backend
        })
      })
      .then(res => res.json())
      .then(data => {
        if(data.error) {
           errBox.innerText = data.error;
           errBox.style.display = "block";
           btn.disabled = false;
           btn.innerText = "Buka Data Kartu";
           return;
        }
        
        // Jika berhasil, render kartu dan sembunyikan layar login
        renderKartu(data);
        document.getElementById('login-admin-container').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
      })
      .catch(err => {
        errBox.innerText = "Terjadi Kesalahan Koneksi Server.";
        errBox.style.display = "block";
        btn.disabled = false;
        btn.innerText = "Buka Data Kartu";
      });
    }

    function chunkArray(arr, size) {
      const result = [];
      for (let i = 0; i < arr.length; i += size) {
        result.push(arr.slice(i, i + size));
      }
      return result;
    }

    function renderKartu(daftarSiswa) {
      const printArea = document.getElementById('print-area');
      printArea.innerHTML = ''; 
      
      const halamanData = chunkArray(daftarSiswa, 10);

      halamanData.forEach((siswaPerHalaman) => {
        const pageDiv = document.createElement('div');
        pageDiv.className = 'a4-page';
        
        siswaPerHalaman.forEach(siswa => {
          let namaTampil = siswa.nama;
          if(namaTampil.length > 25) { namaTampil = namaTampil.substring(0, 25) + "..."; }

          const kartuHTML = `
            <div class="kartu">
              <div class="kartu-header">
                <img src="${LOGO_URL}" alt="Logo" class="kartu-logo">
                <div class="kop-sekolah">
                  <div class="kop-1">Pemerintah Provinsi Jawa Timur</div>
                  <div class="kop-2">SMAN 1 WONGSOREJO</div>
                  <div class="kop-3">KARTU PESERTA CBT</div>
                </div>
              </div>
              
              <div class="kartu-body">
                <table>
                  <tr><td>Nama Siswa</td><td>:</td><td>${namaTampil}</td></tr>
                  <tr><td>Kelas / Jurusan</td><td>:</td><td>${siswa.kelas}</td></tr>
                  <tr><td>USER (NISN)</td><td>:</td><td>${siswa.nisn}</td></tr>
                  <tr><td>PASSWORD</td><td>:</td><td><span class="box-password">${siswa.password}</span></td></tr>
                </table>
              </div>

              <div class="catatan">
                *Bawa kartu ini selama ujian berlangsung. Jangan sampai hilang.
              </div>
            </div>
          `;
          pageDiv.innerHTML += kartuHTML;
        });

        printArea.appendChild(pageDiv);
      });
    }
  </script>
</body>
</html>
